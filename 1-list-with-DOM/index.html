<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <style>
        .hide-edit-mode{
            display: none;
        }
    </style>
    Add to list:
    <span id="errorMsg"></span><br><br>
    <input id="itemname" type="text" name="text" placeholder="Add to list">
    <input id="addBtn" title="Add item to list" type="button" name="addBtn" value="Add">
    <input id="clearBtn" title="Clear list" type="button" name="clearBtn" value="Clear">
    <button id="deleteBtn" title="Enter Delete Mode">Delete</button>
    <ol id="root">
        <span id="editRow" class="hide-edit-mode">
            <input id="editInput" type="text" name="editModeTextField">
            <button id="editBtn" title="Edit Item">Edit</button>
            <button id="cancelBtn" title="Cancel edit action">Cancel</button>
        </span>
    </ol>
    <script>
        let confirmClear = false;       //  Not clearing the list by default
        let editingItem = null;        //   Needs to check if <li> Object element exists, If not it's null (Also null by default) 
        let originalText = null;      //    null by default, when user types in some text, that text will be assigned to originalText
        let isInEditMode = false;     //   BUG FIX 1: was used in root click handler but never declared — caused ReferenceError crash
        let isInDeleteMode = false;
        let confirmDelete = false;

        const message = document.getElementById("errorMsg");
        const addToListBtn = document.getElementById("addBtn");
        const clearBtn = document.getElementById("clearBtn");
        const root = document.getElementById("root");

        // Edit Mode
        const editRow = document.getElementById("editRow");
        const editInput = document.getElementById("editInput");
        const editBtn = document.getElementById("editBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        const deleteBtn = document.getElementById("deleteBtn");

        /**
         * Displays a message on the page with the given color and text.
         * 
         * @param {string} colorName - The color to display the message in.
         * @param {string} messageText - The text to display in the message.
         */
        function showMsg(colorName, messageText){
            message.style.color = colorName;
            message.textContent = messageText;
            return;
        }

        /**
         * Resets the confirmClear state variable to false.
         * This function is used after the user confirms clearing the list or cancels the clear list action.
         */
        function resetClearState(){
            confirmClear = false;
            return;
        }

        /**
         * Resets the previously edited <li> element to its original state.
         * If there is no previously edited element, this function does nothing.
         * 
         * This function is used when the user clicks away from the edited <li> element,
         * effectively cancelling the edit.
         */
        function restorePreviousItem(textToShow){
            // RESTORE previous state for editingItem
            if(!editingItem) return;

            // Restore the <li>'s visible text and styling
                editingItem.textContent = textToShow;
                editingItem.title = "Edit";
                editingItem.style.cursor = "pointer";

                editRow.classList.add("hide-edit-mode");
                // BUG FIX 4: move editRow back into root after every edit so it is never
                // stranded inside a <li> that could get removed by the clear button.
                root.appendChild(editRow);

                editingItem = null;
                isInEditMode = false;   // BUG FIX 1 (cont): reset the flag on exit
        }

        /**
         * Enables edit mode for the given <li> element.
         * If the user is currently editing another <li> element, that element is restored to its original state.
         * The given <li> element is then cleared of its visible text and the edit mode row is appended to it.
         * The user is then shown a message indicating that they are now editing the given <li> element.
         * The user's focus is set to the edit mode text input field.
         * 
         * @param {HTMLLIElement} item - The <li> element to enable edit mode for.
         */
        function enableEditMode(item){
            if(item === editRow) return;

            if(editingItem !== item){
                restorePreviousItem(originalText);
            }

            originalText = item.textContent.trim();

            item.textContent = "";

            editInput.value = originalText;
            editRow.classList.remove("hide-edit-mode");

            item.appendChild(editRow);

            showMsg("orange", `Editing: ${originalText}`);

            editingItem = item;
            editInput.focus();
            return;
        }

        function exitDeleteMode() {
            root.querySelectorAll('li').forEach(li => {
                li.dataset.marked = "false";
                li.style.color = "black";
            });
            isInDeleteMode = false;
            confirmDelete = false;
        }

        function confirmDeletion() {
            const marked = root.querySelectorAll('li[data-marked="true"]');
            if (marked.length === 0) {
                showMsg("red", "No items selected: [EXIT DELETE MODE]");
                exitDeleteMode();
                return;
            }
            if(!confirmDelete){
                showMsg("blue", `sure to delete ${marked.length} items(s)? Click delete again to confirm!`);
                confirmDelete = true;
                return;
            }
            if(confirmDelete){
                confirmDelete = false;
                marked.forEach(li => li.remove());
                showMsg("red", `DELETED: ${marked.length} item(s) and EXIT DELETE MODE`);
                exitDeleteMode();
                return;
            }
        }

        function enableDeleteMode() {
            if (root.querySelectorAll('li').length === 0) {
                showMsg("red", "No items in the list: [CANNOT ENTER DELETE MODE]");
                return;
            }
            isInDeleteMode = true;
            showMsg("red", "Now you can select items to delete: [ENABLED DELETE MODE]");
            root.querySelectorAll('li').forEach(li => {
                li.dataset.marked = "false";
                li.style.color = "purple";
            });
        }

        function addItemToList(name){
            const listItem = document.createElement('li');
            listItem.textContent = name;
            listItem.title = "Edit";
            listItem.style.cursor = "pointer";
            root.append(listItem);

            document.getElementById("itemname").value = "";
        }

        addToListBtn.addEventListener("click", (event) => {

            if(isInDeleteMode){
                isInDeleteMode = false;
                exitDeleteMode();
                showMsg("green", "Exit DELETE MODE")
                return;
            }

            const listItemName = document.getElementById("itemname").value.trim();

            if(confirmClear){
                resetClearState();
            }

            if(!listItemName){
                showMsg("red", "Add an Item to list");
                return;
            }

            // 1. Split the string into an array first
            let listItemArray = listItemName.split(', ');
            let cleanItem = "";
            let count = 0;

            // 2. Loop through each item
            for (let item of listItemArray) {
                cleanItem = item.replace(/[^A-Za-z0-9 ]/g, "").trim();

                // 3. Only add if the item isn't empty after cleaning
                if (cleanItem.length > 0) {
                    addItemToList(cleanItem);
                    count++;
                }
            }

            if(count === 1){
                showMsg("green", `Added ${cleanItem}`);
            } else {
                showMsg("green", `Added +${count} item(s)`);
            }
            return;
        });

        clearBtn.addEventListener("click", (event) => {

            // Remove only <li> elements, leaving the editRow <span> untouched in root.
            const listItems = root.querySelectorAll('li');

            // BUG FIX 4 (cont): if clearing while in edit mode, safely exit first so editRow
            // is moved back to root before we start removing children.
            if(isInEditMode){
                restorePreviousItem(originalText);
            }

            if(isInDeleteMode){
                showMsg("red", "Unable to enter clear state: [DELETE MODE ENABLED - EXIT DELETE MODE FIRST]");
                return;
            }

            if(listItems.length === 0){
                showMsg("red","Nothing to clear");
                return;
            }

            if(!confirmClear){
                showMsg("blue", "Are you sure to clear the list? (Click again to proceed!)");
                confirmClear = true;
                return;
            }

            listItems.forEach(li => root.removeChild(li));

            resetClearState();
            showMsg("green", "Cleared!");
            return;
        });

        root.addEventListener("click", (event) => {
            // BUG FIX 2: clicks from inside editRow (the input, Edit btn, Cancel btn) bubble up
            // to root and would re-trigger enableEditMode. Guard against that here.
            if(confirmClear){
                resetClearState();
            }
            if(event.target.closest('#editRow')) return;

            const listItemClicked = event.target.closest('li');
            
            if(isInDeleteMode){
                if(!listItemClicked){
                    return;
                }
                if (listItemClicked.dataset.marked === "true") {
                    listItemClicked.dataset.marked = "false";
                    listItemClicked.style.color = "purple";
                } else {
                    listItemClicked.dataset.marked = "true";
                    listItemClicked.style.color = "red";
                }
                return;
            }

            if(!listItemClicked){
                showMsg("red", `Nothing to edit: ${listItemClicked}`);
                return;
            }
            if(!isInEditMode){
                isInEditMode = true;
                enableEditMode(listItemClicked);
                return;
            }
            return;
        });

        cancelBtn.addEventListener("click", (event) => {
            restorePreviousItem(originalText);
            showMsg("green", `Restored: ${originalText} - [CANCELED EDIT]`);
        });

        editBtn.addEventListener("click", (event) => {
            if(!editInput.value.trim()){
                showMsg("red", `Update the ${originalText} item to edit`);
                return;
            }
            // BUG FIX 3: save both values before calling restorePreviousItem, because that
            // function sets editingItem = null and isInEditMode = false, and the message
            // needs the old originalText captured first.
            const oldText = originalText;
            const newText = editInput.value.trim();
            restorePreviousItem(newText);
            showMsg("green", `Updated: [${oldText}] to [${newText}]`);
        });

        deleteBtn.addEventListener("click", (event) => {
            
            if(!isInDeleteMode) {
                enableDeleteMode();
                return;
            }

            if(isInDeleteMode){
                confirmDeletion();
            }

            if(confirmClear){
                resetClearState();
            }
        });

    </script>
</body>
</html>
